name: OpenAPI lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  redocly:
    name: Redocly lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint OpenAPI specification
        run: npx --yes @redocly/cli lint openapi.yaml
